<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0D0B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Expense Pro" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <title>Expense Tracker Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1",
      "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
      "xlsx": "https://esm.sh/xlsx@0.18.5"
    }
  }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #0E0D0B; }
    body {
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }
    /* Disable text selection on display elements only */
    div, span, button, h1, h2, h3, h4, h5, h6, p, label, a {
      -webkit-user-select: none;
      user-select: none;
    }
    button { border: none; background: none; padding: 0; color: inherit; font: inherit; cursor: pointer; }
    /* CRITICAL: inputs must be selectable AND show the keyboard on iOS PWA.
       Setting font-size: 16px stops iOS from auto-zooming on focus, which can
       suppress the keyboard. Touch-action and -webkit-user-select must be
       explicitly enabled here to override the body defaults. */
    input, textarea, select {
      -webkit-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default;
      touch-action: auto;
      font-size: 16px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
    }
    .overflow-x-auto::-webkit-scrollbar { display: none; }
    #root { padding-top: env(safe-area-inset-top); }
    .etp-splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0E0D0B; color: #A39B8C;
      font-family: 'Times New Roman', serif; font-style: italic; font-size: 28px;
      z-index: 1; transition: opacity 300ms;
    }
    .etp-splash.hide { opacity: 0; pointer-events: none; }
/* ===========================================================
   Hand-rolled Tailwind-equivalent utilities for ETP PWA.
   Only the classes actually used in ExpenseTrackerPro.jsx.
   =========================================================== */

/* — Display & layout — */
.flex { display: flex; }
.inline { display: inline; }
.grid { display: grid; }
.relative { position: relative; }
.absolute { position: absolute; }
.fixed { position: fixed; }
.inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
.z-50 { z-index: 50; }
.z-[60] { z-index: 60; }

/* — Flex helpers — */
.flex-1 { flex: 1 1 0%; }
.flex-col { flex-direction: column; }
.flex-shrink-0 { flex-shrink: 0; }
.flex-wrap { flex-wrap: wrap; }

.items-start { align-items: flex-start; }
.items-center { align-items: center; }
.items-end { align-items: flex-end; }
.items-baseline { align-items: baseline; }

.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }

/* — Grid columns — */
.grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid-cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
.grid-cols-7 { grid-template-columns: repeat(7, minmax(0, 1fr)); }

/* — Gap (Tailwind: 1 = 0.25rem = 4px) — */
.gap-0.5 { gap: 2px; }
.gap-1 { gap: 4px; }
.gap-1.5 { gap: 6px; }
.gap-2 { gap: 8px; }
.gap-2.5 { gap: 10px; }
.gap-3 { gap: 12px; }
.gap-x-4 { column-gap: 16px; }
.gap-y-3 { row-gap: 12px; }

/* — Sizing — */
.w-full { width: 100%; }
.w-10 { width: 40px; }
.h-1 { height: 4px; }
.min-w-0 { min-width: 0; }

/* — Margin — */
.mx-auto { margin-left: auto; margin-right: auto; }
.mx-4 { margin-left: 16px; margin-right: 16px; }
.mr-2 { margin-right: 8px; }

.mt-1 { margin-top: 4px; }
.mt-1.5 { margin-top: 6px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-5 { margin-top: 20px; }
.mt-6 { margin-top: 24px; }
.mt-7 { margin-top: 28px; }

.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-5 { margin-bottom: 20px; }
.mb-6 { margin-bottom: 24px; }

/* — Padding — */
.p-1 { padding: 4px; }
.p-4 { padding: 16px; }

.pt-4 { padding-top: 16px; }
.pt-14 { padding-top: 56px; }
.pb-1 { padding-bottom: 4px; }
.pb-8 { padding-bottom: 32px; }
.pb-32 { padding-bottom: 128px; }

.px-3 { padding-left: 12px; padding-right: 12px; }
.px-4 { padding-left: 16px; padding-right: 16px; }
.px-5 { padding-left: 20px; padding-right: 20px; }
.px-6 { padding-left: 24px; padding-right: 24px; }

.py-1 { padding-top: 4px; padding-bottom: 4px; }
.py-1.5 { padding-top: 6px; padding-bottom: 6px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.py-2.5 { padding-top: 10px; padding-bottom: 10px; }
.py-3 { padding-top: 12px; padding-bottom: 12px; }
.py-3.5 { padding-top: 14px; padding-bottom: 14px; }
.py-4 { padding-top: 16px; padding-bottom: 16px; }
.py-6 { padding-top: 24px; padding-bottom: 24px; }
.py-8 { padding-top: 32px; padding-bottom: 32px; }
.py-12 { padding-top: 48px; padding-bottom: 48px; }
.py-14 { padding-top: 56px; padding-bottom: 56px; }

/* — Text alignment — */
.text-left { text-align: left; }
.text-center { text-align: center; }
.text-right { text-align: right; }

/* — Borders — */
.rounded-full { border-radius: 9999px; }

/* — Overflow — */
.overflow-x-auto { overflow-x: auto; }

/* — Truncate — */
.truncate {
overflow: hidden;
white-space: nowrap;
text-overflow: ellipsis;
}

/* — space-y (vertical stack spacing) — */
.space-y-1   > * + * { margin-top: 4px; }
.space-y-1.5 > * + * { margin-top: 6px; }
.space-y-2   > * + * { margin-top: 8px; }
.space-y-3   > * + * { margin-top: 12px; }
.space-y-4   > * + * { margin-top: 16px; }
.space-y-5   > * + * { margin-top: 20px; }

/* — Transitions — */
.transition-all       { transition-property: all; transition-duration: 200ms; transition-timing-function: cubic-bezier(0.4,0,0.2,1); }
.transition-transform { transition-property: transform; transition-duration: 200ms; transition-timing-function: cubic-bezier(0.4,0,0.2,1); }
.transition-colors    { transition-property: background-color, border-color, color, fill, stroke;
transition-duration: 200ms; transition-timing-function: cubic-bezier(0.4,0,0.2,1); }

/* — Active states (touch feedback) — */
.active:scale-90:active        { transform: scale(0.90); }
.active:scale-95:active        { transform: scale(0.95); }
.active:scale-[0.98]:active { transform: scale(0.98); }
.active:scale-[0.99]:active { transform: scale(0.99); }
.active:bg-stone-800:active    { background-color: #292524; }
</style>

</head>
<body>
  <div id="root"></div>
  <div id="splash" class="etp-splash">loading…</div>
  <script>
    window.storage = {
      async get(key) {
        const v = localStorage.getItem(key);
        return v != null ? { key, value: v, shared: false } : null;
      },
      async set(key, value) {
        localStorage.setItem(key, value);
        return { key, value, shared: false };
      },
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true, shared: false };
      },
      async list(prefix = '') {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) keys.push(k);
        }
        return { keys, prefix, shared: false };
      },
    };
    const watcher = setInterval(() => {
      const root = document.getElementById('root');
      if (root && root.firstChild) {
        document.getElementById('splash')?.classList.add('hide');
        clearInterval(watcher);
        setTimeout(() => document.getElementById('splash')?.remove(), 400);
      }
    }, 50);
  </script>
  <script type="module" src="bundle.js"></script>
</body>
</html>
