    div, span, button, h1, h2, h3, h4, h5, h6, p, label, a {
      -webkit-user-select: none;
      user-select: none;
    }
    button { border: none; background: none; padding: 0; color: inherit; font: inherit; cursor: pointer; }
    /* CRITICAL: inputs must be selectable AND show the keyboard on iOS PWA.

    input, textarea, select {
      -webkit-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default;
      touch-action: auto;
      font-size: 16px;

    input:focus, textarea:focus, select:focus {

   Only the classes actually used in ExpenseTrackerPro.jsx.

/* — Display & layout — */
.flex { display: flex; }
.inline { display: inline; }
.grid { display: grid; }
.relative { position: relative; }
.absolute { position: absolute; }
.fixed { position: fixed; }
.inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
.z-50 { z-index: 50; }
.z-[60] { z-index: 60; }

/* — Flex helpers — */
.flex-1 { flex: 1 1 0%; }
.flex-col { flex-direction: column; }
.flex-shrink-0 { flex-shrink: 0; }
.flex-wrap { flex-wrap: wrap; }

.items-start { align-items: flex-start; }
.items-center { align-items: center; }
.items-end { align-items: flex-end; }
.items-baseline { align-items: baseline; }

.justify-center { justify-content: center; }

.mr-2 { margin-right: 8px; }

.p-4 { padding: 16px; }

.pt-4 { padding-top: 16px; }

.pb-1 { padding-bottom: 4px; }

/* — Text alignment — */
.text-left { text-align: left; }
.text-center { text-align: center; }
.text-right { text-align: right; }

/* — Borders — */
.rounded-full { border-radius: 9999px; }

/* — Overflow — */
.overflow-x-auto { overflow-x: auto; }

/* — Truncate — */
.truncate {
overflow: hidden;

/* — space-y (vertical stack spacing) — */

transition-duration: 200ms; transition-timing-function: cubic-bezier(0.4,0,0.2,1); }

  <script>
    window.storage = {
      async get(key) {
        const v = localStorage.getItem(key);
        return v != null ? { key, value: v, shared: false } : null;
      },
      async set(key, value) {
        localStorage.setItem(key, value);
        return { key, value, shared: false };
      },
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true, shared: false };
      },
      async list(prefix = '') {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) keys.push(k);
        }
        return { keys, prefix, shared: false };
      },
    };
    const watcher = setInterval(() => {
      const root = document.getElementById('root');
      if (root && root.firstChild) {
        document.getElementById('splash')?.classList.add('hide');
        clearInterval(watcher);
        setTimeout(() => document.getElementById('splash')?.remove(), 400);
      }
    }, 50);
  </script>
